<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário Jéssica Luana</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000 url('fundo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Container Central */
        .stage {
            position: relative;
            width: 350px;
            height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* A Foto que vai sumir */
        #photo-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
            transition: opacity 1.5s ease; /* Efeito de sumir aos poucos */
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        #photo-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        /* Painel de Mensagens que vai aparecer */
        #message-panel {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 30px;
            box-sizing: border-box;
            opacity: 0; /* Começa invisível */
            transition: opacity 1.5s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            text-align: center;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            color: #b8860b;
            font-size: 2.5rem;
            margin: 0 0 20px 0;
        }

        .mural {
            text-align: left;
        }

        .friend-msg {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .friend-name {
            font-weight: 500;
            color: #b8860b;
            display: block;
            font-size: 0.9rem;
            margin-bottom: 3px;
        }

        .text {
            font-size: 0.85rem;
            color: #555;
            font-style: italic;
            line-height: 1.4;
        }

        /* Classe para ativar a transição */
        .reveal #photo-overlay {
            opacity: 0;
            pointer-events: none;
        }

        .reveal #message-panel {
            opacity: 1;
        }

        /* Custom Scrollbar */
        #message-panel::-webkit-scrollbar {
            width: 5px;
        }
        #message-panel::-webkit-scrollbar-thumb {
            background: #b8860b;
            border-radius: 10px;
        }

    </style>
</head>
<body>

    <div class="stage" id="mainStage">
        
        <div id="photo-overlay">
            <img src="cartao-aniversario.jpg" alt="Clique para ver as mensagens">
            <div style="position: absolute; bottom: 10px; width: 100%; text-align: center; color: white; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 1px 1px 2px black;">
                Clique na foto
            </div>
        </div>

        <div id="message-panel">
            <h2>Mensagens</h2>
            
            <div class="mural">
                <div class="friend-msg">
                    <span class="friend-name">Lorena</span>
                    <p class="text">Sua mensagem aqui...</p>
                </div>

                <div class="friend-msg">
                    <span class="friend-name">João</span>
                    <p class="text">Sua mensagem aqui...</p>
                </div>

                <div class="friend-msg">
                    <span class="friend-name">Erica</span>
                    <p class="text">Sua mensagem aqui...</p>
                </div>

                <div class="friend-msg">
                    <span class="friend-name">Gilmara</span>
                    <p class="text">Sua mensagem aqui...</p>
                </div>

                <div class="friend-msg">
                    <span class="friend-name">Pedro</span>
                    <p class="text">Sua mensagem aqui...</p>
                </div>

                <div class="friend-msg">
                    <span class="friend-name">Darly</span>
                    <p class="text">Sua mensagem aqui...</p>
                </div>

                <div class="friend-msg">
                    <span class="friend-name">Lilian</span>
                    <p class="text">Sua mensagem aqui...</p>
                </div>
            </div>

            <p style="font-size: 12px; margin-top: 20px; color: #999;">Com amor, todos nós! ❤️</p>
        </div>

    </div>

    <script>
        const stage = document.getElementById('mainStage');
        const photo = document.getElementById('photo-overlay');

        photo.addEventListener('click', () => {
            stage.classList.add('reveal');
        });
    </script>

</body>
</html>
