<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário Jéssica Luana</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000 url('fundo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Container do Cartão - Ajustado para baixo */
        .card-container {
            position: relative;
            width: 340px;
            height: 480px;
            perspective: 1500px;
            margin-top: 80px; /* Abaixei o cartão para não cobrir o texto do fundo */
        }

        /* O elemento que realmente gira */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* Classe que o JS vai alternar para girar e voltar */
        .is-flipped {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Esconde o verso */
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* FRENTE: cartao-aniversario.jpg */
        .face-front {
            background: #fff;
        }

        .face-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* VERSO: Mensagens */
        .face-back {
            background: rgba(255, 255, 255, 0.98);
            transform: rotateY(180deg); /* Já começa virado no eixo 3D */
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            color: #b8860b;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            text-align: center;
        }

        .mural-scroll {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .friend-box {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .friend-name {
            font-weight: 500;
            color: #b8860b;
            font-size: 0.85rem;
            display: block;
        }

        .msg-text {
            font-size: 0.8rem;
            color: #555;
            font-style: italic;
            margin: 2px 0 0 0;
        }

        /* Scrollbar Dourada */
        .mural-scroll::-webkit-scrollbar { width: 4px; }
        .mural-scroll::-webkit-scrollbar-thumb { background: #b8860b; border-radius: 10px; }

        .hint {
            text-align: center;
            font-size: 9px;
            color: #aaa;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-inner" id="flipCard">
            
            <div class="face face-front">
                <img src="cartao-aniversario.jpg" alt="Foto Jéssica">
            </div>

            <div class="face face-back">
                <h2>Mensagens</h2>
                
                <div class="mural-scroll">
                    <div class="friend-box"><span class="friend-name">Lorena</span><p class="msg-text">Sua mensagem aqui...</p></div>
                    <div class="friend-box"><span class="friend-name">João</span><p class="msg-text">Sua mensagem aqui...</p></div>
                    <div class="friend-box"><span class="friend-name">Erica</span><p class="msg-text">Sua mensagem aqui...</p></div>
                    <div class="friend-box"><span class="friend-name">Gilmara</span><p class="msg-text">Sua mensagem aqui...</p></div>
                    <div class="friend-box"><span class="friend-name">Pedro</span><p class="msg-text">Sua mensagem aqui...</p></div>
                    <div class="friend-box"><span class="friend-name">Darly</span><p class="msg-text">Sua mensagem aqui...</p></div>
                    <div class="friend-box"><span class="friend-name">Lilian</span><p class="msg-text">Sua mensagem aqui...</p></div>
                </div>

                <div class="hint">Clique para voltar</div>
            </div>

        </div>
    </div>

    <script>
        const flipCard = document.getElementById('flipCard');
        
        // Agora o clique alterna (toggle) a classe, permitindo ir e voltar
        flipCard.addEventListener('click', () => {
            flipCard.classList.toggle('is-flipped');
        });
    </script>

</body>
</html>
