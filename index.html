<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário Jéssica Luana</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinhamento fixo no topo */
            background: #000 url('fundo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Container do Cartão - Posicionado na marca vermelha */
        .card-container {
            position: relative;
            width: 320px;
            height: 460px;
            perspective: 1500px;
            margin-top: 200px; /* Ajuste exato para ficar na marca vermelha */
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .is-flipped {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* FRENTE */
        .face-front {
            background: #fff;
        }

        .face-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* VERSO */
        .face-back {
            background: rgba(255, 255, 255, 0.98);
            transform: rotateY(180deg);
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            color: #b8860b;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            text-align: center;
        }

        .mural-scroll {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 8px;
        }

        .friend-box {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f2f2f2;
        }

        .friend-name {
            font-weight: 500;
            color: #b8860b;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 4px;
        }

        .msg-text {
            font-size: 0.8rem;
            color: #444;
            font-style: italic;
            margin: 0;
            line-height: 1.4;
        }

        /* Scrollbar */
        .mural-scroll::-webkit-scrollbar { width: 4px; }
        .mural-scroll::-webkit-scrollbar-thumb { background: #b8860b; border-radius: 10px; }

        .hint {
            text-align: center;
            font-size: 9px;
            color: #aaa;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-inner" id="flipCard">
            
            <div class="face face-front">
                <img src="cartao-aniversario.jpg" alt="Foto Jéssica Luana">
            </div>

            <div class="face face-back">
                <h2>Mensagens</h2>
                
                <div class="mural-scroll">
                    <div class="friend-box"><span class="friend-name">Lorena</span><p class="msg-text">Aguardando mensagem...</p></div>
                    <div class="friend-box"><span class="friend-name">João</span><p class="msg-text">Aguardando mensagem...</p></div>
                    <div class="friend-box"><span class="friend-name">Erica</span><p class="msg-text">Aguardando mensagem...</p></div>
                    <div class="friend-box"><span class="friend-name">Gilmara</span><p class="msg-text">Aguardando mensagem...</p></div>
                    <div class="friend-box"><span class="friend-name">Pedro</span><p class="msg-text">Aguardando mensagem...</p></div>
                    <div class="friend-box"><span class="friend-name">Darly</span><p class="msg-text">Aguardando mensagem...</p></div>
                    <div class="friend-box"><span class="friend-name">Lilian</span><p class="msg-text">Aguardando mensagem...</p></div>
                </div>

                <div class="hint">Clique para voltar</div>
            </div>

        </div>
    </div>

    <script>
        const flipCard = document.getElementById('flipCard');
        flipCard.addEventListener('click', () => {
            flipCard.classList.toggle('is-flipped');
        });
    </script>

</body>
</html>
